<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fragment+Mono:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #000000;
            --ink-soft: #000000;
            --paper: #faf6ee;
            --rule: #d9cdb6;
        }
    </style>
</head>
<body class="font-['Fragment_Mono',monospace] bg-[var(--paper)] text-[var(--ink)] m-0 min-h-screen">
    <div class="max-w-[720px] mx-auto px-6 pt-12 pb-24">

        <h1 class="m-0 mb-12 font-thin text-[40px] tracking-tight">Index</h1>

        <!-- ledger
             row anatomy: year · title (link optional) · note
             to add a row, copy one of the <div class="row"> blocks below -->
        <div class="text-[14px]">

            <div class="row flex flex-wrap sm:flex-nowrap items-baseline gap-x-4 gap-y-1 py-3 border-b border-[var(--rule)]">
                <span class="w-[64px] flex-none text-[12px] text-[var(--ink-soft)]">2025–</span>
                <a href="/restaurants" class="flex-1 min-w-0 no-underline text-inherit hover:opacity-50">Places to Eat</a>
                <span class="w-full sm:w-auto sm:min-w-0 pl-[80px] sm:pl-0 text-left sm:text-right text-[12px] text-[var(--ink-soft)]">index of SEA restaurants, NYC</span>
            </div>

            <div class="row flex flex-wrap sm:flex-nowrap items-baseline gap-x-4 gap-y-1 py-3 border-b border-[var(--rule)]">
                <span class="w-[64px] flex-none text-[12px] text-[var(--ink-soft)]">2025–</span>
                <span class="flex-1 min-w-0">Club Selat</span>
                <span class="w-full sm:w-auto sm:min-w-0 pl-[80px] sm:pl-0 text-left sm:text-right text-[12px] text-[var(--ink-soft)]">coming soon</span>
            </div>

            <!-- template rows — fill in together, then uncomment
            <div class="row flex flex-wrap sm:flex-nowrap items-baseline gap-x-4 gap-y-1 py-3 border-b border-[var(--rule)]">
                <span class="w-[64px] flex-none text-[12px] text-[var(--ink-soft)]">YEAR</span>
                <a href="URL" target="_blank" rel="noopener" class="flex-1 min-w-0 no-underline text-inherit hover:opacity-50">PROJECT TITLE</a>
                <span class="w-full sm:w-auto sm:min-w-0 pl-[80px] sm:pl-0 text-left sm:text-right text-[12px] text-[var(--ink-soft)]">NOTE</span>
            </div>
            -->

        </div>

    </div>
</body>
</html>
