<head>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div class="flex w-full h-full justify-center ">
        <div class="w-[1000px] text-[var(--dark-orange)]">
            <div class="flex justify-between my-[20px]">
                <div>
                    <h1 class="font-sans text-4xl mb-2">Places to Eat</h1>
                    <p class="font-sans mb-6">South-East Asian restaurants around NYC.</p>
                </div>
                <!-- <button>
                    Submit a place
                </button> -->
            </div>
            
            <div class="flex items-center w-full border-2 border-[var(--dark-orange)] bg-[var(--light-orange)]">
                <svg class="w-5 h-5 ml-2 mr-2 text-[var(--dark-orange)]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
                <input type="text" id="search-input" placeholder="Search" class="w-full border-none outline-none py-2 px-[4px] text-[var(--dark-orange)] placeholder-[var(--dark-orange)] bg-[var(--light-orange)]" />
            </div>
            

            <table class="w-full text-[var(--dark-orange)] mt-[20px]">
                <thead class="border-b-2 border-[var(--dark-orange)]">
                    <tr>
                        <th class="font-normal text-left">Restaurant</th>
                        <th class="font-normal text-left">Cuisine</th>
                        <th class="font-normal text-left">Neighbourhood</th>
                        <th class="font-normal text-left">Borough</th>
                        <th class="font-normal text-left">Map</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                </tbody>
            </table>

            <!-- Loading Spinner -->
            <div id="loading-spinner" class="hidden flex justify-center items-center py-8">
                <div class="animate-spin rounded-full h-8 w-8 border-4 border-[var(--dark-orange)] border-t-transparent"></div>
            </div>
        </div>
    </div>
    <script src="restaurants.js"></script>
</body>
